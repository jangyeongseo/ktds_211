<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attributes</title>
</head>

<body>
    <accesskey>Accesskey</accesskey>
    <div>
        <!--  tabindex="1" : 이건 장애인차별방지법에 걸리기때문에 이게 있어야한다. -->
        <input tabindex="1" title="입력" type="text" placeholder="입력하세요" />
        <p tabindex="2">단략을 만들어주는 p 태그</p>
        <!-- Unordered List -->
        <ul tabindex="3">
            <!-- List Item -->
            <il tabindex="4" accesskey="1">첫 번째아이템</il>
            <il tabindex="5" accesskey="2">두 번째 아이템</il>
            <il tabindex="6" accesskey="3">세 번째 아이템</il>
        </ul>
    </div>

    <!-- Divide - 화면을 나누어 영역을 구분시킨다. -->
    <div>
        <p>두 번째 단락</p>
        <p>세 번째 단락</p>
    </div>
</body>

</html>
