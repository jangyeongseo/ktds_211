<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STYLES</title>
    <style type="text/css">
        .onediv {
            background-color: lightblue;
            height: 100px;
            padding: 10px;
            font-family: 'noto sans kr', sans-serif;
        }

        .twodiv {
            background-color: lightgreen;
            height: 100px;
            margin-top: 10px;
        }

        p {
            color: red;
            text-decoration: dashed underline;
            text-decoration: dotted overline;
            text-decoration: double line-through;
            text-decoration: line-through underline;
        }

        span {
            color: blue;
        }

        h1 {
            color: purple;
        }

        h2 {
            color: rgba(255, 0, 0, 0.5);
            /* 16진수 : 슛자가 15까지 있는 숫자 */
        }

        h3 {
            color: rgb(0, 255, 0);

        }
    </style>
</head>

<body>
    <div class="onediv">첫 번째 영역

    </div>
    <div class="twodiv">두 번째 영역</div>

    <p>첫 번째 단락</p>
    <p>두 번째 단락</p>

    <span>첫 번째 span</span>
    <span>두 번째 span</span>

    <h1>첫 번째 제목</h1>
    <h2>두 번째 제목</h2>
    <h3>세 번째 제목</h3>
    <h4>네 번째 제목</h4>
    <h5>다섯 번째 제목</h5>
    <h6>여섯 번째 제목</h6>
</body>

</html>
